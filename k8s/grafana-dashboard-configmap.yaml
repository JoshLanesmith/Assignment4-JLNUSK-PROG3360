apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-config
  namespace: assignment-4
data:
  ecommerce-services-overview.json: |
    {
      "title": "E-Commerce Services Overview",
      "uid": "ecommerce-overview",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "5s",
      "time": {
        "from": "now-15m",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "JVM Heap Memory",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (job) (jvm_memory_used_bytes{area=\"heap\",job=~\"order-service|product-service\"})",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "HTTP Request Rate",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (job) (rate(http_server_requests_seconds_count{job=~\"order-service|product-service\",uri!~\"/actuator.*\"}[1m]))",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Order Total",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "total_orders_total",
              "legendFormat": "{{job}} total_orders"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Pod CPU / Memory",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "avg by (job, instance) (process_cpu_usage{job=~\"order-service|product-service\"}) * 100",
              "legendFormat": "{{job}} CPU"
            },
            {
              "refId": "B",
              "expr": "avg by (job, instance) (process_resident_memory_bytes{job=~\"order-service|product-service\"})",
              "legendFormat": "{{job}} RSS"
            }
          ]
        }
      ]
    }
