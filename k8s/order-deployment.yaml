apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: assignment-4
  labels:
    app: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
      version: blue
  template:
    metadata:
      labels:
        app: order-service
        version: blue
    spec:
      containers:
        - name: order-service
          image: order-service:blue
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          env:
            - name: APP_VERSION
              value: "v1.0"
          envFrom:
            - configMapRef:
                name: assignment-4-config