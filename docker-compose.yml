services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: unleash
      POSTGRES_USER: unleash
      POSTGRES_PASSWORD: unleash
#    volumes:
#      - ./persistent-pg-data:/var/lib/postgresql/data

#  unleash:
#    image: unleashorg/unleash-server:latest
#    depends_on:
#      - db
##    depends_on:
##      db:
##        condition: service_healthy
#    ports:
#      - "4242:4242"
#    environment:
#      DATABASE_URL: "postgres://unleash:unleash@db:5432/unleash"
#      DATABASE_SSL: "false"
#      UNLEASH_DEFAULT_ADMIN_USERNAME: "admin"
#      UNLEASH_DEFAULT_ADMIN_PASSWORD: "admin"

  product-service:
    build: ./ProductServiceA2
    image: product-service:blue
    ports:
      - "8080:8080"
    environment:
      UNLEASH_API_KEY: "${ENV_UNLEASH_API_KEY}"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 3

  order-service:
    build: ./OrderServiceA2
    image: order-service:blue
    ports:
      - "8081:8081"
    environment:
      UNLEASH_API_KEY: "${ENV_UNLEASH_API_KEY}"
    depends_on:
      product-service:
        condition: service_healthy # use `docker events --filter 'event=health_status'` to see the logs for Healthchecks

