spring.application.name=OrderService

server.port=8081

spring.datasource.driver-class-name=org.h2.Driver

# Logging pattern
logging.pattern.console=%d{HH:mm:ss} %-5level [%X{correlationId}] [%X{traceId:-NO_TRACE}] [%X{spanId:-NO_SPAN}] %logger{36} - %msg%n

management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.tracing.propagation.type=b3

management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

product.service.url=${PRODUCT_SERVICE_URL:http://localhost:8080}

# Prometheus
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always